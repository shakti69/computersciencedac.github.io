<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CS Dept DAC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-secondary);
      padding: var(--spacing-md);
    }
    
    .auth-card {
      background-color: var(--card-bg);
      padding: var(--spacing-xl);
      border-radius: var(--br-lg);
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 450px;
    }
    
    .auth-header { text-align: center; margin-bottom: var(--spacing-lg); }
    .form-group { margin-bottom: var(--spacing-md); }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size:0.9rem;}
    
    .auth-btn { width: 100%; margin-top: var(--spacing-md); }
    .error-msg {
      color: var(--danger);
      background-color: rgba(179, 82, 73, 0.1);
      padding: 0.75rem;
      border-radius: var(--br-md);
      margin-bottom: var(--spacing-md);
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div style="width: 50px; height: 50px; background-color: var(--secondary); border-radius: 8px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; color: var(--card-bg);">
          <i class="fas fa-lock fa-lg"></i>
        </div>
        <h1 style="color:var(--primary);">Secure Login</h1>
        <p class="text-muted mt-sm" style="font-size:0.9rem;">Sign in to access Dashboards & Resources</p>
      </div>
      
      <div id="loginMessage" class="hidden"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" class="form-control" required placeholder="User ID">
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary auth-btn">Secure Sign In</button>
      </form>
      
      <div style="text-align:center; margin-top:1.5rem; font-size:0.9rem;">
        <a href="index.html" style="color:var(--text-muted);"><i class="fas fa-arrow-left"></i> Home</a> &nbsp;|&nbsp;
        <a href="signup.html" style="color:var(--secondary); font-weight:600; text-decoration:underline;">Student Signup</a>
      </div>
      

      
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
