<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - CS Dept DAC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page-header {
      background-color: var(--bg-secondary);
      padding: 8rem 0 4rem;
      border-bottom: 2px solid var(--border-color);
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }
    
    .locked-section {
      background-color: var(--card-bg);
      border: 1px dashed var(--border-color);
      padding: 4rem 2rem;
      border-radius: var(--br-lg);
      text-align: center;
      margin-top: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    
    .item-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .item-box {
      background: var(--card-bg);
      padding: 1.5rem;
      border-radius: var(--br-md);
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
      border-left: 4px solid var(--secondary);
    }
    
    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-logo">
        <div style="width: 35px; height: 35px; background-color: var(--secondary); border-radius: 4px; display:flex; align-items:center; justify-content:center; color:#2b2623;">
          <i class="fas fa-university"></i>
        </div>
        <span style="letter-spacing: 1px;">CS DEPT</span>
      </div>
      
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="courses.html" class="nav-link">Courses</a></li>
        <li><a href="faculty.html" class="nav-link">Faculty</a></li>
        <li><a href="students.html" class="nav-link active">Student Portal</a></li>
        <li><a href="gallery.html" class="nav-link">Gallery</a></li>
        <li><a href="notices.html" class="nav-link">Notices</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
        
        <li class="nav-actions mobile-only">
           <div id="authContainerMobile"></div>
           <button class="theme-toggle" id="themeToggleMobile"><i class="fas fa-moon"></i> Theme</button>
        </li>
      </ul>

      <div class="nav-actions desktop-only">
        <div id="authContainerDesktop"></div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      </div>

      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1 class="animate-on-scroll">Student Portal</h1>
      <p class="text-muted mt-sm animate-on-scroll" id="portalSubText">Log in to view your targeted curriculum resources and timetables.</p>
    </div>
  </header>

  <main class="section container">
    <div id="authGatedContent" class="animate-on-scroll">
      <!-- Injected via JS -->
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const currentUser = JSON.parse(localStorage.getItem('cs_dept_currentUser'));
      const gatedContent = document.getElementById('authGatedContent');
      
      if (currentUser && currentUser.role === 'student') {
        const userAudience = `${currentUser.course} ${currentUser.year}`; // e.g., "UG 1"
        document.getElementById('portalSubText').innerHTML = `Welcome back, <strong>${currentUser.name}</strong>. Viewing resources mapped to <strong>${userAudience}</strong>.`;
        
        // Fetch specific data
        const resources = DB.getResources() || [];
        const timetables = DB.getTimetables() || [];
        const notices = DB.getNotices() || [];
        
        const myRes = resources.filter(r => r.audience === userAudience);
        const myTime = timetables.filter(t => t.audience === userAudience);
        const myNotes = notices.filter(n => n.audience === userAudience || n.audience === 'All' || n.audience === 'Public');
        
        let resHtml = myRes.length ? myRes.map(r => `
          <div class="item-box">
             <div style="display:flex; justify-content:space-between; align-items:flex-start;">
               <h3 style="margin:0;"><i class="fas fa-file-alt" style="color:var(--secondary); margin-right:0.5rem;"></i> ${r.title}</h3>
               <span class="badge" style="background:var(--bg-secondary); color:var(--text-main);">${r.type}</span>
             </div>
             <p class="text-muted mt-sm" style="font-size:0.85rem;">Uploaded by: ${r.uploader}</p>
             <a href="${r.link}" target="_blank" class="btn btn-outline mt-sm" style="padding:4px 12px; font-size:0.85rem;">Open Link</a>
          </div>`).join('') : '<p class="text-muted">No specific resources uploaded for your class level yet.</p>';
          
        let timeHtml = myTime.length ? myTime.map(t => `
          <div class="item-box">
             <h3 style="margin:0;"><i class="fas fa-clock" style="color:var(--success); margin-right:0.5rem;"></i> ${t.title}</h3>
             <a href="${t.link}" target="_blank" class="btn btn-outline mt-sm" style="width:100%;">View Timetable Image</a>
          </div>`).join('') : '<p class="text-muted">No timetable allocated yet.</p>';

        let notesHtml = myNotes.length ? myNotes.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(n => `
          <div class="item-box">
             <span class="badge" style="background:var(--accent); color:var(--text-main); margin-bottom:0.5rem; display:inline-block;">${n.date} ${n.audience === 'All' ? '(Global)' : '(Internal)'}</span>
             <h4 style="margin:0; font-size:1.1rem;">${n.title}</h4>
             <p class="text-muted mt-sm">${n.content}</p>
          </div>
        `).join('') : '<p class="text-muted">No notices found.</p>';

        gatedContent.innerHTML = `
          <div class="dashboard-grid">
            
            <div class="main-column">
              <h2 class="mb-lg">Study Resources</h2>
              <div class="item-list mb-xl">${resHtml}</div>
              
              <h2 class="mb-lg">Your Notice Board</h2>
              <div class="item-list">${notesHtml}</div>
            </div>
            
            <div class="side-column">
              <h2 class="mb-md" id="timetables">Routines</h2>
              <div class="item-list mb-xl">${timeHtml}</div>
            </div>
            
          </div>
        `;
      } else if (currentUser && (currentUser.role === 'admin' || currentUser.role === 'teacher')) {
        gatedContent.innerHTML = `
          <div class="locked-section">
            <i class="fas fa-chalkboard-teacher" style="font-size:3rem; color:var(--secondary); margin-bottom:1rem;"></i>
            <h2>Staff Account Logged In</h2>
            <p class="text-muted mt-md mb-lg">You are logged in as teaching staff. To test the student view, please log out and sign in with a Student account.</p>
            <a href="admin.html" class="btn btn-primary" style="margin-top:1.5rem;">Return to CMS</a>
          </div>
        `;
      } else {
        gatedContent.innerHTML = `
          <div class="locked-section">
            <i class="fas fa-lock" style="font-size:3rem; color:var(--text-muted); margin-bottom:1rem;"></i>
            <h2>Student Access Restricted</h2>
            <p class="text-muted mt-md mb-lg">You must sign in with an approved Student account to view your specific class notes and timetables.</p>
            <div style="display:flex; gap:1rem; justify-content:center;">
              <a href="login.html" class="btn btn-primary">Sign In</a>
              <a href="signup.html" class="btn btn-outline">Register</a>
            </div>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
