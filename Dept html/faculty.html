<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Directory - CS Dept DAC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page-header {
      background-color: var(--primary);
      padding: 6rem 0 3rem;
      text-align: center;
      color: white;
    }
    
    .faculty-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }
    
    .faculty-card {
      background-color: var(--card-bg);
      border-radius: var(--br-lg);
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      transition: transform 0.3s ease;
    }
    
    .faculty-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    
    .faculty-img-container {
      width: 100%;
      height: 250px;
      overflow: hidden;
      background-color: var(--primary-light);
    }
    
    .faculty-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    
    .faculty-card:hover .faculty-img {
      transform: scale(1.05);
    }
    
    .faculty-info {
      padding: 1.5rem;
      text-align: center;
    }
    
    .faculty-name {
      font-size: 1.25rem;
      color: var(--text-main);
      margin-bottom: 0.25rem;
    }
    
    .faculty-designation {
      color: var(--accent);
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    
    .faculty-spec {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .faculty-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
    
    .faculty-actions a {
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      color: var(--text-muted);
      border-radius: 50%;
      transition: all 0.2s;
    }
    
    .faculty-actions a:hover {
      background-color: var(--accent);
      color: white;
    }
  </style>
</head>
<body>

  <!-- Navbar (Reused format) -->
  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-logo">
        <div style="width: 35px; height: 35px; background-color: var(--secondary); border-radius: 4px; display:flex; align-items:center; justify-content:center; color:#2b2623;">
          <i class="fas fa-university"></i>
        </div>
        <span style="letter-spacing: 1px;">CS DEPT</span>
      </div>
      
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="courses.html" class="nav-link">Courses</a></li>
        <li><a href="faculty.html" class="nav-link active">Faculty</a></li>
        <li><a href="students.html" class="nav-link">Student Portal</a></li>
        <li><a href="gallery.html" class="nav-link">Gallery</a></li>
        <li><a href="notices.html" class="nav-link">Notices</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
        
        <li class="nav-actions mobile-only">
           <div id="authContainerMobile"></div>
           <button class="theme-toggle" id="themeToggleMobile"><i class="fas fa-moon"></i> Theme</button>
        </li>
      </ul>

      <div class="nav-actions desktop-only">
        <div id="authContainerDesktop"></div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      </div>

      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1 class="animate-on-scroll">Our Esteemed Faculty</h1>
      <p class="text-muted mt-md animate-on-scroll" style="max-width: 600px; margin-left:auto; margin-right:auto; color:#cbd5e1;">Meet our team of experienced educators and industry professionals dedicated to shaping the next generation of technologists.</p>
    </div>
  </header>

  <main class="section container">
    <div class="faculty-grid" id="facultyGrid">
      <!-- Injected via JS -->
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const facultyData = DB.getFaculty() || [];
      const grid = document.getElementById('facultyGrid');
      
      if (facultyData.length === 0) {
        grid.innerHTML = '<p class="text-center text-muted">No faculty profiles found.</p>';
        return;
      }
      
      let html = '';
      facultyData.forEach((f, idx) => {
        html += `
          <div class="faculty-card animate-on-scroll" style="transition-delay: ${idx * 0.1}s">
            <div class="faculty-img-container">
              <img src="${f.image}" alt="${f.name}" class="faculty-img">
            </div>
            <div class="faculty-info">
              <h3 class="faculty-name">${f.name}</h3>
              <div class="faculty-designation">${f.designation}</div>
              <div class="faculty-spec"><i class="fas fa-book-reader"></i> ${f.specialization}</div>
              
              <div class="faculty-actions">
                <a href="#"><i class="fas fa-envelope"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
              </div>
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html;
    });
  </script>
</body>
</html>
